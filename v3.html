<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>段永平的十年之问 · 一张图背后的投资哲学</title>
<style>
:root {
  --bg: #1a1a1f;
  --page-bg: #f5f0e8;
  --text: #2c2416;
  --text-muted: #5c5242;
  --accent: #8b4513;
  --accent-light: #c4783e;
  --shadow: rgba(0,0,0,0.35);
  --flip-duration: 0.65s;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  font-family: 'Georgia', 'Noto Serif SC', 'STSong', 'Songti SC', 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; min-height: 100dvh;
  overflow: hidden;
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  perspective: 1800px;
}

/* ── Book stage ── */
.book-stage {
  position: relative;
  /* Page fills most of viewport, with book-like proportions */
  width: min(88vw, 620px);
  height: min(88vh, 820px);
  height: min(88dvh, 820px);
}

/* ── Page cards ── */
.flip-page {
  position: absolute;
  width: 100%; height: 100%;
  background: var(--page-bg);
  border-radius: 3px 6px 6px 3px;
  box-shadow:
    2px 0 12px rgba(0,0,0,0.08),
    4px 0 28px rgba(0,0,0,0.18);
  transform-origin: left center;
  transform-style: preserve-3d;
  overflow: hidden;
  cursor: pointer;
  z-index: 1;
  transition: transform var(--flip-duration) cubic-bezier(0.55, 0.06, 0.35, 0.94);
  will-change: transform;
}

/* Right edge shadow — simulates page thickness */
.flip-page::after {
  content: '';
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 8px;
  background: linear-gradient(to left, rgba(0,0,0,0.06), transparent);
  pointer-events: none;
  z-index: 5;
}

/* Flipped state — rotated around left edge */
.flip-page.flipped {
  transform: rotateY(-180deg);
  z-index: 0;
  box-shadow:
    -2px 0 12px rgba(0,0,0,0.08),
    -4px 0 28px rgba(0,0,0,0.18);
}

/* The page being actively flipped (highest z-index) */
.flip-page.front {
  z-index: 10;
}

/* Page behind the current one */
.flip-page.behind {
  z-index: 0;
  transform: rotateY(0deg);
}

/* ── Page inner content ── */
.page-inner {
  padding: 5% 6%;
  height: 100%;
  display: flex; flex-direction: column;
  position: relative;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.page-num {
  position: absolute;
  bottom: 16px; right: 20px;
  font-size: 11px;
  color: var(--text-muted);
  opacity: 0.4;
}

/* ── Typography ── */
.page-inner h1 {
  font-size: clamp(17px, 2.5vw, 22px);
  color: var(--accent);
  margin-bottom: 14px;
  line-height: 1.45;
  font-weight: normal;
  letter-spacing: 0.3px;
}

.page-inner h2 {
  font-size: clamp(14px, 2vw, 17px);
  color: var(--accent);
  margin: 16px 0 8px;
  font-weight: normal;
}

.page-inner p {
  font-size: clamp(13px, 1.8vw, 15px);
  line-height: 1.85;
  color: var(--text);
  margin-bottom: 10px;
  text-indent: 2em;
}

.page-inner p.no-indent { text-indent: 0; }

.page-inner .quote {
  border-left: 3px solid var(--accent);
  padding-left: 14px;
  margin: 12px 0;
  color: var(--accent);
  font-style: italic;
  font-size: clamp(13px, 1.8vw, 15px);
}

.page-inner .highlight {
  color: var(--accent);
  font-weight: bold;
}

.page-inner .small {
  font-size: clamp(11px, 1.5vw, 13px);
  color: var(--text-muted);
}

/* ── Cover page ── */
.cover-bg {
  background: linear-gradient(150deg, #2c1810 0%, #4a2c17 35%, #5e321f 60%, #3d1f0f 100%);
  color: #f5e6d3;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  padding: 10%;
}

.cover-bg h1 {
  font-size: clamp(22px, 3.5vw, 30px);
  color: #e8c97a;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.cover-bg .subtitle {
  font-size: clamp(13px, 1.8vw, 15px);
  color: #c8a86e;
  margin-bottom: 28px;
}

.cover-bg .author {
  font-size: clamp(11px, 1.5vw, 13px);
  color: #a08060;
  margin-top: 36px;
}

/* ── Back cover ── */
.back-bg {
  background: linear-gradient(150deg, #2c1810 0%, #4a2c17 35%, #5e321f 60%, #3d1f0f 100%);
  color: #f5e6d3;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  padding: 10%;
}

.back-bg h2 {
  font-size: clamp(17px, 2.5vw, 22px);
  color: #e8c97a;
  margin-bottom: 18px;
  font-weight: normal;
}

.back-bg .final-quote {
  font-size: clamp(15px, 2.2vw, 19px);
  color: #c8a86e;
  line-height: 1.8;
  max-width: 80%;
  font-style: italic;
}

/* ── Chart ── */
.chart-section { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.chart-row {
  display: flex; align-items: center;
  margin: 7px 0; gap: 10px;
  font-size: clamp(11px, 1.6vw, 13px);
}
.chart-label {
  width: clamp(56px, 10vw, 72px);
  text-align: right;
  color: var(--text-muted);
  font-size: clamp(10px, 1.4vw, 12px);
  flex-shrink: 0;
}
.chart-bar {
  height: clamp(13px, 2vw, 17px);
  border-radius: 2px;
  position: relative; transition: width 0.6s;
  min-width: 48px;
  display: flex; align-items: center;
  padding-left: 8px;
  font-size: clamp(9px, 1.3vw, 11px);
  color: #fff; font-weight: bold;
}
.chart-bar.nvidia  { background: #76b900; }
.chart-bar.apple   { background: #555; }
.chart-bar.china   { background: #e74c3c; }
.chart-era {
  text-align: center;
  font-size: clamp(11px, 1.5vw, 13px);
  color: var(--accent);
  margin: 10px 0 2px;
  font-weight: bold;
}

/* ── Positions grid ── */
.positions {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px; margin: 8px 0;
}
.position-card {
  background: white;
  padding: 11px 14px;
  border-radius: 4px;
  font-size: clamp(12px, 1.6vw, 13px);
  border-left: 3px solid var(--accent);
}
.position-card .name {
  font-weight: bold; color: var(--accent);
  display: block; margin-bottom: 3px;
}
.position-card .reason {
  color: var(--text); font-size: clamp(11px, 1.4vw, 12px);
  line-height: 1.5;
}

/* ── List ── */
.page-inner ul {
  list-style: none; padding: 0; margin: 10px 0;
}
.page-inner ul li {
  font-size: clamp(12px, 1.7vw, 14px);
  line-height: 1.75; color: var(--text);
  padding: 3px 0 3px 20px;
  position: relative;
}
.page-inner ul li::before {
  content: "—";
  position: absolute; left: 0;
  color: var(--accent-light);
}

/* ── Divider ── */
.divider {
  text-align: center; color: var(--accent-light);
  margin: 10px 0; font-size: clamp(13px, 2vw, 16px);
}

/* ── Page indicator (top) ── */
.page-indicator {
  position: fixed;
  bottom: max(14px, env(safe-area-inset-bottom, 14px));
  left: 50%; transform: translateX(-50%);
  color: #777; font-size: clamp(10px, 1.4vw, 12px);
  z-index: 100;
  background: rgba(26,26,31,0.7);
  padding: 4px 14px; border-radius: 10px;
  white-space: nowrap;
}

/* ── Tap zones (invisible) ── */
.tap-left, .tap-right {
  position: absolute; top: 0; bottom: 0;
  width: 40%; z-index: 8;
}
.tap-left  { left: 0; }
.tap-right { right: 0; }

/* ── Responsive book sizing ── */
@media (min-width: 768px) {
  .book-stage {
    width: min(75vw, 560px);
    height: min(84vh, 780px);
    height: min(84dvh, 780px);
  }
}

@media (min-width: 1024px) {
  .book-stage {
    width: min(58vw, 540px);
    height: min(82vh, 800px);
    height: min(82dvh, 800px);
  }
}

@media (min-width: 1440px) {
  .book-stage {
    width: min(46vw, 580px);
    height: min(80vh, 840px);
    height: min(80dvh, 840px);
  }
}

/* Landscape phone — wider but shorter */
@media (max-width: 767px) and (orientation: landscape) {
  .book-stage {
    width: min(80vw, 480px);
    height: min(90vh, 400px);
    height: min(90dvh, 400px);
  }
}
</style>
</head>
<body>

<div class="page-indicator" id="pageInfo">第 1 / 17 页</div>

// ── Flip engine ──
let currentPage = 0;
let isFlipping = false;
const stage = document.getElementById('bookStage');

function render() {
  // Clear all but tap zones
  const tapLeft = document.getElementById('tapLeft');
  const tapRight = document.getElementById('tapRight');
  stage.innerHTML = '';
  stage.appendChild(tapLeft);
  stage.appendChild(tapRight);

  const total = PAGES.length;

  for (let i = 0; i < total; i++) {
    const el = document.createElement('div');
    el.className = 'flip-page';

    if (i < currentPage) {
      // Pages before current: flipped away (hidden behind)
      el.classList.add('flipped');
    } else if (i === currentPage) {
      // Current page: front and center
      el.classList.add('front');
    } else {
      // Pages after current: behind
      el.classList.add('behind');
    }

    el.innerHTML = pageHTML(PAGES[i].id);
    el.dataset.index = i;
    stage.appendChild(el);
  }

  updateInfo();
}

function flip(dir) {
  if (isFlipping) return;
  const target = currentPage + dir;
  if (target < 0 || target >= PAGES.length) return;

  isFlipping = true;

  if (dir > 0) {
    // Forward: current page flips away to the left
    const cur = stage.querySelector(`.flip-page[data-index="${currentPage}"]`);
    const nxt = stage.querySelector(`.flip-page[data-index="${target}"]`);

    if (cur) {
      cur.classList.remove('front');
      cur.classList.add('flipped');
    }
    if (nxt) {
      nxt.classList.remove('behind');
      nxt.classList.add('front');
    }

    currentPage = target;
  } else {
    // Backward: previous page flips back from left
    const prev = stage.querySelector(`.flip-page[data-index="${target}"]`);
    const cur = stage.querySelector(`.flip-page[data-index="${currentPage}"]`);

    if (prev) {
      prev.classList.remove('flipped');
      prev.classList.add('front');
    }
    if (cur) {
      cur.classList.remove('front');
      cur.classList.add('behind');
    }

    currentPage = target;
  }

  updateInfo();

  setTimeout(() => { isFlipping = false; }, 700);
}

function goToPage(idx) {
  if (isFlipping || idx === currentPage || idx < 0 || idx >= PAGES.length) return;

  // Jump: rebuild from scratch
  currentPage = idx;
  isFlipping = true;
  render();
  setTimeout(() => { isFlipping = false; }, 100);
}

function updateInfo() {
  document.getElementById('pageInfo').textContent =
    `第 ${currentPage + 1} / ${PAGES.length} 页`;
}

// ── Controls ──


document.getElementById('tapLeft').addEventListener('click', () => flip(-1));
document.getElementById('tapRight').addEventListener('click', () => flip(1));

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') flip(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') flip(-1);
  if (e.key === 'Home') goToPage(0);
  if (e.key === 'End') goToPage(PAGES.length - 1);
});

// Touch swipe
let touchX = 0, touchY = 0;
document.addEventListener('touchstart', (e) => {
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  const dx = touchX - e.changedTouches[0].clientX;
  const dy = touchY - e.changedTouches[0].clientY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 35) {
    flip(dx > 0 ? 1 : -1);
  }
}, { passive: true });

// Init
render();
</script>
