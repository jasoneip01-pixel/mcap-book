<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>十年巨变 · 市值之书</title>
<style>
:root{--bg:#0d0d0d;--paper:#f5f0e8;--ink:#1a1a1a;--gold:#c9a84c;--green:#1e8449;--blue:#2471a3;--red:#8b1a1a;--purple:#6c3483}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);display:flex;justify-content:center;align-items:center;min-height:100dvh;padding:12px;font-family:Georgia,'Noto Serif SC','Source Han Serif SC',serif;user-select:none;touch-action:none}
.book-stage{perspective:2200px;width:min(100% - 24px,420px);position:relative;display:flex;justify-content:center}
.book-shadow{position:absolute;bottom:-10px;left:6%;width:88%;height:28px;background:radial-gradient(ellipse at center,rgba(0,0,0,.4) 0%,transparent 70%);filter:blur(12px);pointer-events:none;z-index:0}
.book{position:relative;width:100%;aspect-ratio:3/4;transform-style:preserve-3d;z-index:1}
.page{position:absolute;top:0;left:0;width:100%;height:100%;overflow-y:auto;border-radius:3px;display:flex;flex-direction:column}
.page-current{z-index:2;filter:drop-shadow(0 4px 16px rgba(0,0,0,.35))}
.page-underneath{z-index:1}
.page-flipper{position:absolute;top:0;left:0;width:100%;height:100%;z-index:4;transform-style:preserve-3d;transform-origin:left center;pointer-events:none;will-change:transform;backface-visibility:hidden}
.page-flipper .page-front,.page > div{flex:1;width:100%}
.page-flipper .page-back{position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;overflow:auto;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:clamp(20px,3.5vw,40px)}
.page-flipper .page-back{transform:rotateY(180deg);background:linear-gradient(135deg,#f5f0e8 0%,#ede5d5 50%,#f0e8d8 100%)}
.page-flipper .page-back::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#f5f0e8 0%,#ede5d5 50%,#f0e8d8 100%);opacity:.15;z-index:-1}
.nav-zone{position:absolute;top:0;height:100%;width:35%;z-index:10;cursor:pointer}
.nav-left{left:0}.nav-right{right:0}
.indicator{position:fixed;bottom:clamp(20px,3.5vh,36px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:rgba(255,255,255,.85);padding:6px 18px;border-radius:16px;font-size:clamp(11px,2vw,14px);z-index:20;backdrop-filter:blur(10px);pointer-events:none;font-family:-apple-system,'PingFang SC',sans-serif;transition:opacity 0.3s ease}

/* ===== Flip shadow ===== */
.curl-shadow{position:absolute;top:0;left:-8px;width:16px;height:100%;background:linear-gradient(to right,rgba(0,0,0,.3),transparent);z-index:3;pointer-events:none}

/* ===== Theme backgrounds ===== */
.pg-cover{background:linear-gradient(170deg,#0d0d0d 0%,#1a1a2e 40%,#16213e 100%);color:var(--paper)}
.pg-dark{background:linear-gradient(180deg,#111 0%,#1a1a1a 100%);color:var(--paper)}
.pg-paper{background:linear-gradient(135deg,#f5f0e8 0%,#ede0cc 50%,#f0e8d8 100%);color:var(--ink)}
.pg-blood{background:linear-gradient(170deg,#1a0a0a 0%,#2a1010 50%,#3a1515 100%);color:#d4a0a0}
.pg-blue{background:linear-gradient(160deg,#0a1525 0%,#152540 50%,#1a3050 100%);color:#c0d0e0}
.pg-green{background:linear-gradient(160deg,#0a1a10 0%,#0d2a18 50%,#0f3a20 100%);color:#a0d0b0}

/* ===== Typography ===== */
h1{font-size:clamp(28px,6.5vw,44px);letter-spacing:clamp(4px,1vw,8px);font-weight:700}
h2{font-size:clamp(18px,4vw,28px);letter-spacing:3px;font-weight:600}
h3{font-size:clamp(12px,2.2vw,16px);letter-spacing:3px;font-weight:400}
.stat-label{font-size:clamp(11px,2vw,14px);letter-spacing:4px;opacity:.55;margin-bottom:clamp(16px,2.5vh,28px)}
.num-huge{font-size:clamp(40px,9vw,64px);font-weight:700;line-height:1.1}
.num-large{font-size:clamp(26px,5.5vw,44px);font-weight:600;line-height:1.3;letter-spacing:1px}
.sub-label{font-size:clamp(11px,2vw,14px);opacity:.7;margin-top:6px}
p{font-size:clamp(12px,2.4vw,16px);line-height:1.9;text-align:center;max-width:86%;letter-spacing:0.02em;margin:clamp(8px,1vh,14px) 0}
blockquote{font-size:clamp(11px,2.2vw,15px);font-style:italic;text-align:center;line-height:1.9;max-width:86%;margin:clamp(14px,2.2vh,24px) 0;letter-spacing:0.03em}
.divider{width:50px;height:2px;margin:clamp(12px,2vh,24px) auto}
.divider-light{width:30px;height:1px;margin:clamp(14px,2vh,22px) auto;background:rgba(255,255,255,.25)}
.divider-gold{width:60px;height:2px;margin:clamp(20px,3vh,32px) auto;background:var(--gold)}

/* ===== Visual elements ===== */
.bar-chart{display:flex;align-items:flex-end;justify-content:center;gap:clamp(6px,1vw,10px);width:92%;height:clamp(120px,24vw,200px);margin:clamp(18px,2.8vh,32px) 0;position:relative}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;max-width:70px;position:relative}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:8px;position:relative}
.bar-val{position:absolute;top:clamp(-18px,-2.8vw,-22px);font-size:clamp(9px,1.8vw,12px);font-weight:700}
.bar-lbl{position:absolute;bottom:clamp(-16px,-2.2vw,-20px);font-size:clamp(8px,1.5vw,11px);white-space:nowrap;font-weight:600}

.ratio-row{display:flex;align-items:center;gap:clamp(8px,1.2vw,14px);width:88%;margin:clamp(12px,1.8vh,22px) 0;padding:clamp(6px,.8vh,10px) clamp(10px,2vw,16px);background:rgba(0,0,0,.04);border-radius:8px}
.ratio-row .rl{font-size:clamp(11px,2vw,14px);min-width:clamp(70px,14vw,90px)}
.ratio-row .rt{flex:1;height:clamp(16px,2.8vw,22px);background:rgba(0,0,0,.08);border-radius:10px;overflow:hidden;position:relative}
.ratio-row .rf{height:100%;border-radius:10px}
.ratio-row .rf span{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:clamp(9px,1.5vw,11px);color:#fff;font-weight:700}

.insight{width:90%;margin:clamp(12px,1.8vh,20px) 0;padding:clamp(14px,2vh,24px) clamp(16px,3vw,28px);background:rgba(201,168,76,.08);border-radius:8px;border:1px solid rgba(201,168,76,.2)}
.insight .il{font-size:clamp(10px,1.8vw,13px);color:#b7950b;font-weight:600;letter-spacing:2px;margin-bottom:8px}
.insight p{font-size:clamp(10px,2vw,14px);margin:0;max-width:100%;text-align:left}

.timeline{display:flex;justify-content:center;gap:clamp(20px,4vw,48px);width:88%;margin:clamp(14px,2.5vh,24px) 0;position:relative}
.timeline::before{content:'';position:absolute;top:8px;left:15%;right:15%;height:1px;background:rgba(255,255,255,.15)}
.timeline-item{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1}
.timeline-item .dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--gold)}
.timeline-item .ty{font-size:clamp(10px,1.8vw,13px);font-weight:600}
.timeline-item .tt{font-size:clamp(9px,1.5vw,11px);opacity:.6}

.cross{font-size:clamp(22px,4.5vw,36px);font-family:Georgia,serif}

/* ===== Scrollable content page ===== */
.scroll-content{overflow-y:auto;width:100%;flex:1;display:flex;flex-direction:column;align-items:center;-webkit-overflow-scrolling:touch;padding:clamp(12px,1.5vh,16px) 0}

/* ===== Responsive ===== */
@media(min-width:660px){.book-stage{width:min(100% - 48px,480px)}.indicator{bottom:32px;padding:8px 22px}}
@media(min-width:1024px){body{padding:32px}.book-stage{width:min(100% - 64px,520px)}.indicator{bottom:48px;padding:10px 28px;font-size:15px}}
@media(orientation:landscape) and (max-height:500px){
  .book-stage{width:auto;height:calc(100dvh - 40px)}.book{width:auto;height:100%}
  .indicator{bottom:6px;padding:3px 12px;font-size:10px}
  .bar-chart{height:80px}.num-huge{font-size:clamp(28px,5vw,40px)}
  .insight{padding:4px 8px;margin:3px 0}
}
</style>
</head>
<body>

<div class="book-stage">
  <div class="book-shadow"></div>
  <div class="book" id="book"></div>
  <div class="nav-zone nav-left" id="navLeft"></div>
  <div class="nav-zone nav-right" id="navRight"></div>
</div>
<div class="indicator" id="indicator">1 / 11</div>

<script>
(function(){
var pages=[
  // ====== 0: COVER ======
  '<div class="pg-cover" style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:clamp(24px,5vw,48px)">'+
    '<div style="color:var(--gold);font-size:clamp(16px,3vw,24px);margin-bottom:clamp(16px,3vh,32px);letter-spacing:8px">✦ ✦ ✦</div>'+
    '<h1 style="color:var(--gold)">十年巨变</h1>'+
    '<div class="divider-gold"></div>'+
    '<div style="font-size:clamp(14px,3vw,20px);letter-spacing:clamp(6px,1vw,10px);color:rgba(255,255,255,.6);margin-bottom:clamp(20px,4vh,40px)">市 值 的 故 事</div>'+
    '<div style="color:var(--gold);font-size:clamp(14px,2.5vw,20px);margin-bottom:clamp(24px,5vh,48px)">✦</div>'+

    '<div class="bar-chart">'+

      '<p style="text-align:left;font-size:clamp(10px,2vw,13px)">NVIDIA赢了。但这不是故事的结尾——这是故事的<strong>中间点</strong>。苹果、微软并没有消失。真正的故事是：总市值这个盘子变大了，但<strong>分蛋糕的逻辑变了</strong>——从「连接用户」变成了「提供算力」。</p>'+
    '</div>'+
    '<div class="insight" style="margin:clamp(10px,1.8vh,18px) 0;text-align:left">'+
      '<div class="il">🔍 第二层 · 为什么是NVIDIA</div>'+
      '<p style="text-align:left;font-size:clamp(10px,2vw,13px)">2015年没人押注NVIDIA——因为<strong>它不性感</strong>。不做手机，不做社交，不做电商。它做的是别人不想做的东西：图形卡、并行计算、CUDA生态。十年后当AI需要大规模算力时，全世界才发现：<strong>只有它准备好了</strong>。这不是运气——是在没人看见的地方默默修了十年的路。</p>'+

    '<div class="insight" style="margin:clamp(10px,1.8vh,18px) 0;text-align:left">'+

var N=pages.length, cur=0, flip=false;
var bk=document.getElementById('book'), ind=document.getElementById('indicator');

function gP(i){return bk.querySelector('.page[data-page="'+i+'"]')}
function uI(){ind.textContent=(cur===0?'封面':cur===N-1?'封底':'第'+(cur+1)+'页')+' / '+N}

function rC(){
  for(var i=0;i<N;i++){
    var e=gP(i);
    if(!e)continue;
    if(i===cur){
      e.style.display='flex';
      e.style.zIndex='2';
      e.style.opacity='1';
      e.className='page page-current';
    }else{
      e.style.display='none';
      e.style.opacity='0';
      e.className='page';
    }
  }
  uI();
}
function cl(){
  var f=bk.querySelector('.page-flipper');
  if(f)f.remove();
  var s=bk.querySelector('.curl-shadow');
  if(s)s.remove();
}

for(var i=0;i<N;i++){
  var d=document.createElement('div');
  d.className='page';
  d.setAttribute('data-page',i);
  d.innerHTML=pages[i];
  bk.appendChild(d);
}
rC();

function doFlip(dst,dir){
  if(flip||dst<0||dst>=N)return;
  var t=dst>cur?cur:dst;
  flip=true;

  // Show destination page underneath BEFORE creating flipper
  var dp=gP(dst);
  if(dp){dp.style.display='flex';dp.style.zIndex='1';dp.style.opacity='1';dp.className='page page-underneath';}

  var sh=document.createElement('div');
  sh.className='curl-shadow';
  sh.style.opacity='0';
  sh.style.transition='opacity 0.3s ease';
  bk.appendChild(sh);
  requestAnimationFrame(function(){sh.style.opacity='1';});

  var fl=document.createElement('div');
  fl.className='page-flipper';
  fl.style.zIndex='5';

  var fr=document.createElement('div');
  fr.className='page-front '+(dir>0?'pg-'+t:'pg-'+cur);
  fr.innerHTML=dir>0?pages[t]:pages[cur];

  var ba=document.createElement('div');
  ba.className='page-back '+(dir>0?'pg-'+cur:'pg-'+t);
  ba.innerHTML=dir>0?pages[dst]:pages[t];

  fl.appendChild(fr);
  fl.appendChild(ba);
  bk.appendChild(fl);

  var r=dir>0?-180:0;
  requestAnimationFrame(function(){
    fl.style.transition='transform 0.65s cubic-bezier(0.15,0.7,0.3,1)';
    fl.style.transform='rotateY('+r+'deg)';
  });

  var cleanup=function(){
    cur=dst;
    requestAnimationFrame(function(){
      cl();
      rC();
      flip=false;
    });
  };

  fl.addEventListener('transitionend',function fn(){
    fl.removeEventListener('transitionend',fn);
    cleanup();
  });
  setTimeout(function(){
    if(flip)cleanup();
  },800);
}

function next(){doFlip(cur+1,1);}
function prev(){doFlip(cur-1,-1);}

document.getElementById('navRight').addEventListener('click',next);
document.getElementById('navLeft').addEventListener('click',prev);
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();prev();}
});

var tx=0,sw=false;
document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;sw=true;},{passive:true});
document.addEventListener('touchmove',function(e){if(sw)e.preventDefault();},{passive:false});
document.addEventListener('touchend',function(e){
  if(!sw)return;sw=false;
  var dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>30){if(dx<0)next();else prev();}
});

})();
</script>
